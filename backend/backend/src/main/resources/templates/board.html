<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ChessTomic - Partida Online</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root{ --bg:#0f0f0f; --panel:#1c1c1c; --green:#4CAF50; --text:#ffffff; --border:#333; }
        *{ margin:0; padding:0; box-sizing:border-box; }
        body{ background:var(--bg); color:white; font-family:Arial,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:30px; }
        .status-box{ width:100%; max-width:1200px; background:var(--panel); padding:30px; border-radius:20px; text-align:center; margin-bottom:30px; box-shadow:0 0 25px rgba(0,0,0,.4); }
        .info{ color:var(--green); font-weight:bold; }
        #game-layout{ width:100%; display:flex; justify-content:center; align-items:flex-start; gap:30px; flex-wrap:wrap; }
        .player-card{ width:260px; background:var(--panel); border-radius:20px; padding:25px; text-align:center; box-shadow:0 0 20px rgba(0,0,0,.4); }
        .elo{ color:#bbb; margin-bottom:20px; font-size:1rem; }
        .captures{ min-height:50px; background:#111; border-radius:10px; padding:10px; display:flex; justify-content:center; align-items:center; gap:5px; flex-wrap:wrap; font-size:2rem; }
        #board{ width:650px; max-width:92vw; border:6px solid var(--border); border-radius:12px; overflow:hidden; }
        #promotion-menu{ display:none; position:absolute; background:#222; border:2px solid var(--green); border-radius:14px; padding:12px; z-index:9999; }
        #promotion-menu img{ width:70px; cursor:pointer; transition:.2s; margin:4px; }
        @media(max-width:1100px){ #game-layout{ flex-direction:column; align-items:center; } .player-card{ width:90%; } }
        .player-main-info{
    display:flex;
    align-items:center;
    gap:12px;
}

.player-avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    background:var(--green);
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:1.2rem;
}

.player-data{
    display:flex;
    flex-direction:column;
}

.player-name{
    color:white;
    font-size:1rem;
    font-weight:700;
}

.player-elo{
    color:#9ad0ff;
    font-size:.9rem;
    font-weight:600;
}
    </style>
</head>
<body>

<div class="status-box">
    <p>Estado: <span id="status" class="info">Cargando...</span></p>
    <p>Turno de: <span id="turn" class="info">Blancas</span></p>
</div>

<div id="my-captures"></div>
<div id="opp-captures"></div>

<div id="game-layout">
    <div class="player-card top-player">
    <div class="player-main-info">
        <div class="player-avatar">♚</div>

        <div class="player-data">
            <div class="player-name" id="opponent-name">
                Oponente
            </div>

            <div class="player-elo">
                <span id="opponent-elo">1200</span> ELO
            </div>
        </div>
    </div>
</div>

    <div id="board-container">
        <div id="board"></div>
        <div style="margin-top:15px; color:#999; text-align:center;">
            ID: <span th:text="${gameId}"></span> | 
            Juegas con: <span th:text="${color == 'white' ? 'Blancas' : 'Negras'}"></span>
        </div>
    </div>

    <div class="player-card bottom-player">
    <div class="player-main-info">
        <div class="player-avatar">♔</div>

        <div class="player-data">
            <div class="player-name" id="player-name">
                Tú
            </div>

            <div class="player-elo">
                <span id="player-elo">1200</span> ELO
            </div>
        </div>
    </div>
</div>
</div>


<div id="promotion-menu">
    <img id="p-q" src="" onclick="selectPromotion('q')">
    <img id="p-r" src="" onclick="selectPromotion('r')">
    <img id="p-b" src="" onclick="selectPromotion('b')">
    <img id="p-n" src="" onclick="selectPromotion('n')">
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script th:inline="javascript">
    let board = null;
    let game = new Chess();
    let stompClient = null;
    let pendingMove = null;
    
   
    const myColor = /*[[${color}]]*/ 'white'; 
    const gameId = /*[[${gameId}]]*/ '';

    function pieceTheme(piece) {
        return 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/' + piece.toLowerCase() + '.png';
    }

   
    function onDragStart(source, piece, position, orientation) {
        if (game.game_over()) return false;

        if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
            (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
            return false;
        }

        if (myColor === 'white' && piece.search(/^b/) !== -1) return false;
        if (myColor === 'black' && piece.search(/^w/) !== -1) return false;
        
        if ((myColor === 'white' && game.turn() !== 'w') ||
            (myColor === 'black' && game.turn() !== 'b')) {
            return false;
        }
    }
    async function loadPlayersInfo(){
    const response = await fetch(`/api/game/${gameId}/players`);
    const data = await response.json();

    document.getElementById("player-name").textContent = data.me.name;
    document.getElementById("player-elo").textContent = data.me.elo;

    document.getElementById("opponent-name").textContent = data.opponent.name;
    document.getElementById("opponent-elo").textContent = data.opponent.elo;
}

loadPlayersInfo();

    function onDrop(source, target, piece, newPos, oldPos, orientation, event) {
        if ((myColor === 'white' && game.turn() !== 'w') || (myColor === 'black' && game.turn() !== 'b')) {
            return 'snapback';
        }

        const movingPiece = game.get(source);
        if (movingPiece && movingPiece.type === 'p' && (target[1] === '8' || target[1] === '1')) {
            pendingMove = { from: source, to: target };
            showPromotionMenu(movingPiece.color, event.pageX, event.pageY);
            return 'snapback';
        }

        const move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';

        board.position(game.fen());
        updateStatus();
        sendMove(source, target, 'q');
         if (game.in_checkmate()) {

        let ganador = game.turn() === 'w'
            ? "Negras"
            : "Blancas";

        finalizarPartida(ganador);

        return;
    }

    }

    function onSnapEnd() {
        board.position(game.fen());
    }

    const config = {
        draggable: true,
        position: 'start',
        orientation: myColor, 
        pieceTheme: pieceTheme,
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
    };

    board = Chessboard('board', config);

function updateStatus() {
    var status = '';
    var moveColor = (game.turn() === 'b') ? 'Negras' : 'Blancas';

    if (game.in_checkmate()) {
        status = 'Juego terminado, ' + moveColor + ' en jaque mate.';
    } else if (game.in_draw()) {
        status = 'Juego terminado, tablas.';
    } else {
        status = 'En curso';
        if (game.in_check()) status += ', ' + moveColor + ' en jaque';
    }

    const statusEl = document.getElementById('status');
    if (statusEl) statusEl.innerText = status;

    const history = game.history({ verbose: true });
    const icons = {
        p: '♟', n: '♞', b: '♝', r: '♜', q: '♛', k: '♚'
    };

    let whiteCaps = ''; 
    let blackCaps = ''; 
    history.forEach(move => {
        if (move.captured) {
            if (move.color === 'w') {

                blackCaps += icons[move.captured];
            } else {
                whiteCaps += icons[move.captured];
            }
        }
    });

    const myCapsEl = document.getElementById('my-captures');
    const oppCapsEl = document.getElementById('opp-captures');

    if (myCapsEl && oppCapsEl) {
        if (myColor === 'white') {
            myCapsEl.innerText = whiteCaps;  
            oppCapsEl.innerText = blackCaps; 
        } else {
            myCapsEl.innerText = blackCaps;  
            oppCapsEl.innerText = whiteCaps; 
        }
    }
}

    function connect() {
        const socket = new SockJS('/ws-chess');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect({}, function() {
            document.getElementById('status').innerText = 'Conectado';
            stompClient.subscribe('/topic/game/' + gameId, function(message) {
                const moveData = JSON.parse(message.body);
                if (moveData.senderColor !== myColor) {
                    game.move({ from: moveData.from, to: moveData.to, promotion: moveData.promotion });
                    board.position(game.fen());
                    updateStatus();
                }
            });
        });
    }

    function sendMove(from, to, promotion) {
        stompClient.send("/app/move/" + gameId, {}, JSON.stringify({
            from: from, to: to, promotion: promotion, gameId: gameId, senderColor: myColor
        }));
    }

    function showPromotionMenu(color, x, y) {
        const menu = document.getElementById('promotion-menu');
        const p = color === 'w' ? 'w' : 'b';
        document.getElementById('p-q').src = pieceTheme(p + 'Q');
        document.getElementById('p-r').src = pieceTheme(p + 'R');
        document.getElementById('p-b').src = pieceTheme(p + 'B');
        document.getElementById('p-n').src = pieceTheme(p + 'N');
        menu.style.display = 'block';
        menu.style.left = x + 'px'; menu.style.top = y + 'px';
    }

    function selectPromotion(p) {
        document.getElementById('promotion-menu').style.display = 'none';
        const move = game.move({ from: pendingMove.from, to: pendingMove.to, promotion: p });
        if (move) {
            board.position(game.fen());
            sendMove(pendingMove.from, pendingMove.to, p);
            updateStatus();
        }
    }

    connect();
function updateStatus() {
    var status = '';
    var moveColor = (game.turn() === 'b') ? 'Negras' : 'Blancas';

    const history = game.history({ verbose: true });
    const icons = { p: '♟', n: '♞', b: '♝', r: '♜', q: '♛', k: '♚' };
    let whiteCaps = '', blackCaps = '';

    history.forEach(move => {
        if (move.captured) {
            if (move.color === 'w') blackCaps += icons[move.captured];
            else whiteCaps += icons[move.captured];
        }
    });

    document.getElementById('my-captures').innerText = (myColor === 'white') ? whiteCaps : blackCaps;
    document.getElementById('opp-captures').innerText = (myColor === 'white') ? blackCaps : whiteCaps;

    if (game.in_checkmate()) {
        status = 'Juego terminado, ' + moveColor + ' en jaque mate.';
        
        let winner = (game.turn() === 'b') ? "white" : "black";
        
        if (game.turn() !== (myColor === 'white' ? 'w' : 'b')) {
            enviarFinPartida(winner);
        }
    } else if (game.in_draw()) {
        status = 'Juego terminado, tablas.';
        enviarFinPartida("draw");
    } else {
        status = 'En curso';
        if (game.in_check()) status += ', ' + moveColor + ' en jaque';
    }

    const statusEl = document.getElementById('status');
    if (statusEl) statusEl.innerText = status;
}

function enviarFinPartida(resultado) {
    stompClient.send("/app/game-over/" + gameId, {}, JSON.stringify({
        winner: resultado
    }));
}

stompClient.subscribe('/topic/game/' + gameId, function (message) {
   
    const data = JSON.parse(message.body);

    console.log("MENSAJE GAME OVER:", data);

    if (data.type === "GAME_OVER") {
        
        const retoChat = document.getElementById('notificacion-reto');
        if (retoChat) {
            retoChat.remove(); 
        }
   
        document.body.innerHTML = `
            <div style="
                height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                background:#111;
                color:white;
                font-size:3em;
                flex-direction:column;
            ">
                <h1>🏆 ${data.winner} gana</h1>
                <p>Volviendo al menú...</p>
            </div>
        `;

        setTimeout(() => {
            window.location.href = "/";
        }, 3000);
    }


    if (data.senderColor !== myColor) {
        game.move({
            from: data.from,
            to: data.to,
            promotion: data.promotion || 'q'
        });
        board.position(game.fen());
        updateStatus();
    }
});


function showChallengeNotification(data) {
    const challenger = data.from;
    
    const notification = `
        <div>
            <p>${challenger} te está retando a una partida</p>
            <button onclick="acceptChallenge('${challenger}')">Aceptar</button>
            <button onclick="rejectChallenge('${challenger}')" style="background-color: #ff5555;">Rechazar</button>
        </div>
    `;
    showPopup(notification);
}

function rejectChallenge(challengerName) {
    stompClient.send("/app/reject-challenge", {}, JSON.stringify({
        from: myUsername, 
        to: challengerName 
    }));
    hidePopup(); 
}
function finalizarPartida(ganador) {

    stompClient.send("/app/game-over", {}, JSON.stringify({
    type: "GAME_OVER",
    winner: ganador,
    gameId: gameId
}));

    document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#111;
            color:white;
            font-size:3em;
            flex-direction:column;
        ">
            <h1> ${ganador} gana</h1>
            <p>Volviendo al menú...</p>
        </div>
    `;

    fetch("/api/game/end", {
        method: "POST"
    });

    setTimeout(() => {
        window.location.href = "/";
    }, 3000);
}
</script>
</body>
</html>
